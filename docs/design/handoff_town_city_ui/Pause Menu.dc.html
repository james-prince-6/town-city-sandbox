<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Space Grotesk',sans-serif;background:#b3ada0;}
  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#cabfac;border:3px solid #e7e1d4;border-radius:6px;}
  input[type=range].dcr{-webkit-appearance:none;appearance:none;height:10px;border-radius:5px;border:3px solid #0e0d12;background:#cabfac;outline:none;}
  input[type=range].dcr::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:999px;background:#c8941e;border:3px solid #0e0d12;cursor:pointer;}
  input[type=range].dcr::-moz-range-thumb{width:20px;height:20px;border-radius:999px;background:#c8941e;border:3px solid #0e0d12;cursor:pointer;}
</style>
</helmet>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="position:relative;width:1200px;height:675px;overflow:hidden;border-radius:6px;background:#0e0d12;font-family:'Space Grotesk',sans-serif;">
    <!-- paused scene -->
    <div style="position:absolute;inset:0;background:linear-gradient(#4a86a4 0 34%,#9a866b 34% 56%,#6a5e50 56% 100%);"></div>
    <div style="position:absolute;left:120px;top:210px;width:150px;height:190px;background:rgba(16,12,10,.45);"></div>
    <div style="position:absolute;left:300px;top:160px;width:110px;height:240px;background:rgba(16,12,10,.55);"></div>
    <div style="position:absolute;right:170px;top:190px;width:190px;height:210px;background:rgba(16,12,10,.45);"></div>
    <div style="position:absolute;left:690px;top:300px;width:130px;height:220px;background:repeating-linear-gradient(45deg,rgba(255,255,255,.08) 0 8px,rgba(0,0,0,.18) 8px 16px);border-radius:4px;"></div>
    <!-- frosted wash -->
    <div style="position:absolute;inset:0;background:rgba(231,225,212,0.28);backdrop-filter:blur(3px);"></div>
    <div style="position:absolute;inset:0;background:rgba(14,13,18,.42);"></div>

    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">

      <!-- MAIN PANEL -->
      <sc-if value="{{ isMain }}" hint-placeholder-val="{{ true }}">
        <div style="width:360px;background:rgba(231,225,212,0.95);border:3px solid #0e0d12;border-radius:8px;padding:22px;display:flex;flex-direction:column;gap:12px;">
          <div style="font-family:'Chakra Petch';font-weight:700;font-size:38px;letter-spacing:.5px;color:#221f1a;text-align:center;">Paused</div>
          <div style="height:3px;background:#cabfac;margin-bottom:2px;"></div>
          <sc-for list="{{ buttons }}" as="b" hint-placeholder-count="7">
            <div onClick="{{ b.onClick }}" onMouseEnter="{{ b.onHover }}" style="{{ b.style }}">
              <span style="{{ b.caretStyle }}">▸</span>
              <span style="flex:1;font-family:'Chakra Petch';font-weight:600;font-size:19px;letter-spacing:.3px;color:{{ b.textColor }};">{{ b.label }}</span>
            </div>
          </sc-for>
        </div>
      </sc-if>

      <!-- SETTINGS PANEL -->
      <sc-if value="{{ isSettings }}">
        <div style="width:440px;background:rgba(231,225,212,0.95);border:3px solid #0e0d12;border-radius:8px;padding:22px;display:flex;flex-direction:column;gap:13px;">
          <div style="display:flex;align-items:center;gap:12px;">
            <div onClick="{{ back }}" style="cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;background:#fbf8f0;border:3px solid #0e0d12;border-radius:6px;font-family:'Chakra Petch';font-weight:700;font-size:18px;color:#221f1a;">‹</div>
            <div style="font-family:'Chakra Petch';font-weight:700;font-size:28px;color:#221f1a;">Settings</div>
          </div>
          <div style="height:3px;background:#cabfac;"></div>
          <sc-for list="{{ sliders }}" as="s" hint-placeholder-count="5">
            <div style="display:flex;flex-direction:column;gap:5px;">
              <div style="display:flex;align-items:center;justify-content:space-between;">
                <span style="font-family:'Chakra Petch';font-weight:600;font-size:14px;color:#221f1a;">{{ s.label }}</span>
                <span style="font-weight:700;font-size:13px;color:#6a655c;">{{ s.display }}</span>
              </div>
              <input type="range" class="dcr" min="{{ s.min }}" max="{{ s.max }}" step="{{ s.step }}" value="{{ s.value }}" onInput="{{ s.onInput }}" style="width:100%;">
            </div>
          </sc-for>
          <!-- fullscreen toggle -->
          <div onClick="{{ toggleFs }}" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
            <span style="font-family:'Chakra Petch';font-weight:600;font-size:14px;color:#221f1a;">Fullscreen</span>
            <div style="{{ fsTrack }}"><div style="{{ fsKnob }}"></div></div>
          </div>
          <!-- font size radio -->
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
            <span style="font-family:'Chakra Petch';font-weight:600;font-size:14px;color:#221f1a;white-space:nowrap;">UI Text Size</span>
            <div style="display:flex;gap:5px;flex:1;">
              <sc-for list="{{ fontOpts }}" as="f" hint-placeholder-count="3">
                <div onClick="{{ f.onClick }}" style="{{ f.style }}">{{ f.label }}</div>
              </sc-for>
            </div>
          </div>
        </div>
      </sc-if>

      <!-- CONTROLS PANEL -->
      <sc-if value="{{ isControls }}">
        <div style="width:460px;height:520px;background:rgba(231,225,212,0.95);border:3px solid #0e0d12;border-radius:8px;padding:22px;display:flex;flex-direction:column;gap:13px;">
          <div style="display:flex;align-items:center;gap:12px;">
            <div onClick="{{ back }}" style="cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;background:#fbf8f0;border:3px solid #0e0d12;border-radius:6px;font-family:'Chakra Petch';font-weight:700;font-size:18px;color:#221f1a;">‹</div>
            <div style="font-family:'Chakra Petch';font-weight:700;font-size:28px;color:#221f1a;">Controls</div>
          </div>
          <div style="height:3px;background:#cabfac;"></div>
          <div style="flex:1;min-height:0;overflow-y:auto;padding-right:6px;display:flex;flex-direction:column;gap:5px;">
            <sc-for list="{{ controls }}" as="c" hint-placeholder-count="12">
              <div style="display:flex;align-items:center;gap:12px;padding:6px 4px;border-bottom:2px solid #d6cdba;">
                <span style="flex:none;min-width:74px;display:inline-flex;align-items:center;justify-content:center;height:26px;padding:0 9px;background:#221f1a;border-radius:5px;font-family:'Chakra Petch';font-weight:600;font-size:13px;color:#e7d9a8;">{{ c.key }}</span>
                <span style="flex:1;font-weight:600;font-size:15px;color:#221f1a;">{{ c.label }}</span>
              </div>
            </sc-for>
          </div>
        </div>
      </sc-if>

    </div>

    <!-- toast -->
    <sc-if value="{{ toast }}">
      <div style="position:absolute;left:50%;top:26px;transform:translateX(-50%);background:#221f1a;border:3px solid #0e0d12;border-radius:6px;padding:8px 18px;font-family:'Chakra Petch';font-weight:600;font-size:14px;color:#e7d9a8;">{{ toast }}</div>
    </sc-if>

    <!-- footer hint -->
    <div style="position:absolute;left:24px;right:24px;bottom:14px;display:flex;align-items:center;justify-content:flex-end;">
      <span style="font-weight:600;font-size:12px;letter-spacing:.4px;color:#e7e1d4;">↑↓ navigate &nbsp;·&nbsp; Enter select &nbsp;·&nbsp; Esc back / resume</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1248,&quot;height&quot;:723}}">
class Component extends DCLogic {
  constructor(p){ super(p); this.state = { panel:'main', sel:0, vol:0.8, music:0.6, sfx:0.9, amb:0.5, sens:0.25, fs:false, font:1.0 }; }

  componentDidMount(){
    this._key=(e)=>{
      const s=this.state;
      if(e.key==='Escape'){ if(s.panel!=='main') this.setState({panel:'main',sel:0}); else this._flash('Resuming…'); return; }
      if(s.panel!=='main') return;
      const items=this._items(); const n=items.length;
      if(e.key==='ArrowUp'){ e.preventDefault(); this.setState({sel:(s.sel-1+n)%n}); }
      else if(e.key==='ArrowDown'){ e.preventDefault(); this.setState({sel:(s.sel+1)%n}); }
      else if(e.key===' '||e.key==='Enter'){ e.preventDefault(); const it=items[s.sel]; if(it) it.act(); }
    };
    window.addEventListener('keydown', this._key);
  }
  componentWillUnmount(){ window.removeEventListener('keydown', this._key); }
  _flash(msg){ if(this._t) clearTimeout(this._t); this._msg=msg; this.forceUpdate(); this._t=setTimeout(()=>{ this._msg=''; this.forceUpdate(); }, 1600); }

  _items(){
    return [
      { id:'resume', label:'Resume', act:()=>this._flash('Resuming…') },
      { id:'save', label:'Save Game', act:()=>this._flash('Opening save slots…') },
      { id:'load', label:'Load Game', act:()=>this._flash('Opening load slots…') },
      { id:'settings', label:'Settings', act:()=>this.setState({panel:'settings'}) },
      { id:'controls', label:'Controls', act:()=>this.setState({panel:'controls'}) },
      { id:'menu', label:'Main Menu', act:()=>this._flash('Returning to title…') },
      { id:'quit', label:'Quit', act:()=>this._flash('See you, hero.') },
    ];
  }

  renderVals(){
    const ink='#0e0d12', cream='#e7e1d4', bright='#fbf8f0', text='#221f1a', dim='#6a655c', gold='#c8941e';
    const s=this.state;
    const items=this._items();
    const sel=Math.min(s.sel, items.length-1);
    const buttons=items.map((it,i)=>{ const on=i===sel; return {
      label:it.label, onClick:()=>it.act(), onHover:()=>{ if(this.state.sel!==i) this.setState({sel:i}); },
      style:{ display:'flex', alignItems:'center', gap:'12px', padding:'10px 14px', cursor:'pointer', borderRadius:'7px',
        border:'3px solid '+(on?ink:'transparent'), background: on?bright:'transparent' },
      caretStyle:{ flex:'none', width:'14px', fontSize:'15px', lineHeight:'1', color: on?gold:'transparent' },
      textColor: on?text:dim };
    });

    const pct=(v)=>Math.round(v*100)+'%';
    const set=(k)=>(e)=>this.setState({[k]:parseFloat(e.target.value)});
    const sliders=[
      { label:'Master Volume', key:'vol', value:s.vol, min:0, max:1, step:0.01, display:pct(s.vol), onInput:set('vol') },
      { label:'Music Volume', key:'music', value:s.music, min:0, max:1, step:0.01, display:pct(s.music), onInput:set('music') },
      { label:'SFX Volume', key:'sfx', value:s.sfx, min:0, max:1, step:0.01, display:pct(s.sfx), onInput:set('sfx') },
      { label:'Ambient Volume', key:'amb', value:s.amb, min:0, max:1, step:0.01, display:pct(s.amb), onInput:set('amb') },
      { label:'Mouse Sensitivity', key:'sens', value:s.sens, min:0.1, max:1, step:0.05, display:s.sens.toFixed(2), onInput:set('sens') },
    ];

    const fsTrack={ width:'52px', height:'28px', borderRadius:'999px', border:'3px solid '+ink, background: s.fs?gold:cream, position:'relative', transition:'background .15s' };
    const fsKnob={ position:'absolute', top:'1px', left: s.fs?'25px':'1px', width:'20px', height:'20px', borderRadius:'999px', background:ink, transition:'left .15s' };

    const fontOpts=[{l:'Small',v:0.9},{l:'Normal',v:1.0},{l:'Large',v:1.2}].map(o=>{ const on=Math.abs(s.font-o.v)<0.001; return {
      label:o.l, onClick:()=>this.setState({font:o.v}),
      style:{ flex:'1', textAlign:'center', cursor:'pointer', padding:'7px 4px', borderRadius:'6px', fontFamily:"'Chakra Petch', sans-serif", fontWeight:'600', fontSize:'13px',
        background: on?bright:cream, color: on?text:dim, border:'3px solid '+ink } };
    });

    const controls=[
      {key:'W',label:'Move Forward'},{key:'S',label:'Move Backward'},{key:'A',label:'Move Left'},{key:'D',label:'Move Right'},
      {key:'Space',label:'Jump'},{key:'Shift',label:'Sprint'},{key:'Ctrl',label:'Dodge / Roll'},{key:'E',label:'Interact / Talk'},
      {key:'LMB',label:'Use / Attack'},{key:'RMB',label:'Block'},{key:'Q',label:'Previous Item / Tab'},{key:'Scroll',label:'Next Item / Tab'},
      {key:'I',label:'Inventory'},{key:'K',label:'Skills'},{key:'J',label:'Quest Log'},{key:'F5',label:'Quick Save'},
      {key:'F9',label:'Quick Load'},{key:'Esc',label:'Pause / Back'},
    ];

    return {
      isMain:s.panel==='main', isSettings:s.panel==='settings', isControls:s.panel==='controls',
      back:()=>this.setState({panel:'main'}),
      buttons, sliders, controls, fontOpts,
      fsTrack, fsKnob, toggleFs:()=>this.setState({fs:!s.fs}),
      toast:this._msg||'',
    };
  }
}
</script>
</body>
</html>
