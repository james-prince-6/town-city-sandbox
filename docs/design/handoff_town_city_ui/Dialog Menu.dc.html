<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Space Grotesk',sans-serif;background:#b3ada0;}
  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#cabfac;border:3px solid #e7e1d4;border-radius:6px;}
  @keyframes dcBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
</style>
</helmet>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="position:relative;width:1200px;height:675px;overflow:hidden;border-radius:6px;background:#0e0d12;font-family:'Space Grotesk',sans-serif;">
    <!-- paused scene -->
    <div style="position:absolute;inset:0;background:linear-gradient(#4a86a4 0 38%,#9a866b 38% 60%,#6a5e50 60% 100%);"></div>
    <div style="position:absolute;left:110px;top:140px;width:160px;height:260px;background:rgba(16,12,10,.45);"></div>
    <div style="position:absolute;right:150px;top:120px;width:200px;height:280px;background:rgba(16,12,10,.4);"></div>
    <div style="position:absolute;left:640px;top:280px;width:140px;height:240px;background:repeating-linear-gradient(45deg,rgba(255,255,255,.08) 0 8px,rgba(0,0,0,.18) 8px 16px);border-radius:4px;"></div>
    <div style="position:absolute;inset:0;background:rgba(14,13,18,.5);"></div>

    <sc-if value="{{ open }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute;inset:0;">
        <!-- speaker portrait, sitting above the box -->
        <div style="position:absolute;left:46px;bottom:228px;display:flex;flex-direction:column;align-items:center;gap:8px;animation:dcBob 3s ease-in-out infinite;">
          <div style="{{ portraitStyle }}">{{ npc.ab }}</div>
        </div>

        <!-- name plate -->
        <div style="position:absolute;left:166px;bottom:236px;display:flex;align-items:center;gap:9px;background:#3a3226;border:3px solid #0e0d12;border-radius:6px;padding:6px 14px;">
          <span style="font-family:'Chakra Petch';font-weight:600;font-size:18px;color:#e7e1d4;letter-spacing:.3px;">{{ npc.name }}</span>
          <span style="font-weight:600;font-size:11px;letter-spacing:.5px;color:#cdb98a;">{{ npc.role }}</span>
        </div>

        <!-- dialog box -->
        <div style="position:absolute;left:46px;right:46px;bottom:30px;height:190px;background:rgba(231,225,212,0.95);border:3px solid #0e0d12;border-radius:8px;padding:20px 24px;display:flex;flex-direction:column;">
          <!-- line text -->
          <sc-if value="{{ showLine }}" hint-placeholder-val="{{ true }}">
            <div style="flex:1;min-height:0;display:flex;flex-direction:column;gap:6px;">
              <div style="font-family:'Space Grotesk';font-weight:500;font-size:21px;line-height:1.4;color:#221f1a;text-wrap:pretty;">{{ line }}</div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <span style="font-weight:600;font-size:12px;letter-spacing:.4px;color:#6a655c;">{{ progress }}</span>
              <div onClick="{{ advance }}" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <span style="font-family:'Chakra Petch';font-weight:600;font-size:14px;color:#221f1a;">{{ advanceLabel }}</span>
                <span style="display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;padding:0 8px;background:#221f1a;color:#e7e1d4;font-family:'Chakra Petch';font-weight:600;font-size:12px;border-radius:5px;">{{ advanceKey }}</span>
              </div>
            </div>
          </sc-if>

          <!-- choices -->
          <sc-if value="{{ showChoices }}">
            <div style="flex:1;min-height:0;display:flex;flex-direction:column;gap:0;overflow-y:auto;scroll-snap-type:y mandatory;border-top:2px solid #cabfac;">
              <sc-for list="{{ choices }}" as="c" hint-placeholder-count="3">
                <div onClick="{{ c.onClick }}" onMouseEnter="{{ c.onHover }}" style="{{ c.style }}">
                  <span style="{{ c.caretStyle }}">▸</span>
                  <span style="flex:1;font-family:'Space Grotesk';font-weight:600;font-size:17px;line-height:1.2;color:{{ c.textColor }};">{{ c.text }}</span>
                  <sc-if value="{{ c.tag }}"><span style="{{ c.tagStyle }}">{{ c.tag }}</span></sc-if>
                  <span style="{{ c.keyStyle }}">{{ c.num }}</span>
                </div>
              </sc-for>
            </div>
          </sc-if>
        </div>

        <!-- bottom hint -->
        <div style="position:absolute;left:46px;right:46px;bottom:8px;display:flex;align-items:center;justify-content:flex-end;">
          <span style="font-weight:600;font-size:11px;letter-spacing:.4px;color:#cdc7ba;">Space / E — continue &nbsp;·&nbsp; 1–4 — pick reply &nbsp;·&nbsp; Esc — end conversation</span>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ closed }}">
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
        <div onClick="{{ openDialog }}" style="cursor:pointer;display:flex;align-items:center;gap:9px;padding:8px 15px;background:#e7e1d4;border:3px solid #0e0d12;border-radius:6px;">
          <span style="display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;padding:0 6px;background:#221f1a;color:#e7e1d4;font-family:'Chakra Petch';font-weight:600;font-size:13px;border-radius:4px;">E</span>
          <span style="font-family:'Chakra Petch';font-weight:600;font-size:15px;color:#221f1a;">Talk to Barry</span>
        </div>
      </div>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1248,&quot;height&quot;:723}}">
class Component extends DCLogic {
  constructor(p){ super(p); this.state = { open:true, node:'start', line:0, csel:0 }; }

  componentDidMount(){
    this._key = (e) => {
      const s=this.state;
      if(e.key==='Escape'){ this.setState({open:false}); return; }
      if(e.key==='e' && !s.open){ this.setState({open:true, node:'start', line:0}); return; }
      if(!s.open) return;
      const node=this._tree()[s.node];
      if(node.lines && s.line < node.lines.length){
        if(e.key===' '||e.key==='e'||e.key==='Enter'){ e.preventDefault(); this._advance(); }
        return;
      }
      if(node.choices){
        if(e.key==='ArrowUp'){ e.preventDefault(); this.setState({csel:Math.max(0,s.csel-1)}); return; }
        if(e.key==='ArrowDown'){ e.preventDefault(); this.setState({csel:Math.min(node.choices.length-1,s.csel+1)}); return; }
        if(e.key===' '||e.key==='e'||e.key==='Enter'){ e.preventDefault(); const c=node.choices[s.csel]; if(c) this._goto(c.to); return; }
        const m=e.key.match(/^[1-4]$/);
        if(m){ const idx=parseInt(e.key)-1; if(node.choices[idx]) this._goto(node.choices[idx].to); }
      } else if(node.end){
        if(e.key===' '||e.key==='e'||e.key==='Enter'){ this.setState({open:false}); }
      }
    };
    window.addEventListener('keydown', this._key);
  }
  componentWillUnmount(){ window.removeEventListener('keydown', this._key); }

  _npc(){ return { ab:'BAR', name:'Barry', role:'Bartender · Schemer' }; }

  _tree(){
    return {
      start:{ lines:[
        "Well, well. Look who staggered back into my fine establishment.",
        "You still smell like goo, by the way. Compliments of the alley, I assume.",
        "So — what'll it be? I'm a busy man with very flexible ethics.",
      ], to:'hub' },
      hub:{ choices:[
        { text:"Got any work for me?", to:'quest' },
        { text:"What's good to drink?", to:'drink', tag:'SHOP' },
        { text:"Heard anything interesting lately?", to:'gossip' },
        { text:"Never mind. I'm leaving.", to:'bye' },
      ] },
      quest:{ lines:[
        "Work? Always. The downtown goo's gotten... opinionated.",
        "Clear it out and there's gold in it. Real gold, not the cursed stuff.",
      ], to:'questPick' },
      questPick:{ choices:[
        { text:"Deal. I'll handle the goo.", to:'accept', tag:'ACCEPT' },
        { text:"How much gold are we talking?", to:'haggle' },
        { text:"Goo isn't really my thing.", to:'hub' },
      ] },
      haggle:{ lines:[
        "Two hundred. And before you scoff — that's two hundred more than you have now.",
      ], to:'questPick' },
      accept:{ lines:[
        "Knew you'd come around. Quest's in your log. Try not to die memorably.",
      ], to:'hub' },
      drink:{ lines:[
        "Frog Fizz is on tap. Liquid Courage if you've got a death wish.",
        "Step up to the bar and I'll pour. Coin first, hero.",
      ], to:'hub' },
      gossip:{ lines:[
        "Word is the Mayor's been buying pocket sand by the crate. Suspicious, eh?",
        "Mr. Frog's still looking for his bow. Reward's a heartfelt 'thank you.'",
      ], to:'hub' },
      bye:{ end:true, lines:["Suit yourself. Door's behind you. Try not to hit it on the way out."] },
    };
  }

  _advance(){ const n=this._tree()[this.state.node]; if(this.state.line < n.lines.length-1) this.setState({line:this.state.line+1}); else this._afterLines(); }
  _afterLines(){ const n=this._tree()[this.state.node]; if(n.end){ this.setState({open:false}); } else { this._goto(n.to); } }
  _goto(node){ this.setState({ node, line:0, csel:0 }); }

  renderVals(){
    const ink='#0e0d12', cream='#e7e1d4', bright='#fbf8f0', text='#221f1a', dim='#6a655c', gold='#c8941e';
    const s=this.state, node=this._tree()[s.node];
    const inLines = !!node.lines && s.line < node.lines.length;
    // end nodes have lines too; treat last line of end as line view, choices hidden
    const showChoices = !!node.choices && !inLines;
    const showLine = inLines || (node.end && s.line>=0 && !node.choices);

    let line='', progress='', advanceLabel='Continue', advanceKey='␣';
    if(node.lines){
      line=node.lines[Math.min(s.line,node.lines.length-1)];
      progress=node.lines.length>1 ? (Math.min(s.line+1,node.lines.length)+' / '+node.lines.length) : '';
      const last = s.line>=node.lines.length-1;
      advanceLabel = last ? (node.end?'End':'Reply') : 'Continue';
    }

    const csel=Math.min(s.csel, Math.max(0,(node.choices||[]).length-1));
    const choices=(node.choices||[]).map((c,i)=>{ const on=i===csel; return { text:c.text, num:(i+1), tag:c.tag||'',
      onClick:()=>this._goto(c.to), onHover:()=>{ if(this.state.csel!==i) this.setState({csel:i}); },
      style:{ display:'flex', alignItems:'center', gap:'12px', padding:'11px 6px 11px 14px', cursor:'pointer', scrollSnapAlign:'start',
        borderBottom:'2px solid #cabfac', borderLeft:'4px solid '+(on?gold:'transparent'),
        background: on?'rgba(200,148,30,0.14)':'transparent' },
      caretStyle:{ flex:'none', width:'14px', fontSize:'15px', lineHeight:'1', color: on?gold:'transparent' },
      textColor: on?text:'#4a463f',
      keyStyle:{ flex:'none', width:'22px', height:'22px', display:'flex', alignItems:'center', justifyContent:'center', borderRadius:'4px',
        background: on?'#221f1a':'transparent', color: on?cream:dim, border:'2px solid '+(on?ink:'#cabfac'),
        fontFamily:"'Chakra Petch', sans-serif", fontWeight:'600', fontSize:'12px' },
      tagStyle:{ flex:'none', fontFamily:"'Space Grotesk', sans-serif", fontWeight:'700', fontSize:'10px', letterSpacing:'.5px', color:'#1a1407',
        background: c.tag==='ACCEPT'?'#5ba36a':(c.tag==='SHOP'?gold:'#4f9ed6'), borderRadius:'3px', padding:'2px 7px' } }; });

    const npc=this._npc();
    return {
      open:s.open, closed:!s.open,
      openDialog:()=>this.setState({open:true, node:'start', line:0}),
      npc,
      portraitStyle:{ width:'108px', height:'108px', display:'flex', alignItems:'center', justifyContent:'center', borderRadius:'8px',
        background:'#3a3226', border:'4px solid '+ink, fontFamily:"'Chakra Petch', sans-serif", fontWeight:'600', fontSize:'24px', color:'#e7d9a8' },
      showLine, showChoices,
      line, progress, advanceLabel, advanceKey,
      advance:()=>this._advance(),
      choices,
    };
  }
}
</script>
</body>
</html>
